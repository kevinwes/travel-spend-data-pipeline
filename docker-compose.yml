version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: travel_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: travel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: travel_airflow_init
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    volumes:
      - ./airflow:/opt/airflow
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Kevin
      --lastname Admin
      --role Admin
      --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: travel_airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas psycopg2-binary"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow:/opt/airflow
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: bash -c "airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: travel_airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas psycopg2-binary"
    volumes:
      - ./airflow:/opt/airflow
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: bash -c "airflow scheduler"

volumes:
  postgres_data: